name: Update milestone data

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Java advancements
        run: python scripts/fetch-java.py

      - name: Fetch Bedrock achievements
        run: python scripts/fetch-bedrock.py

      - name: Merge milestones
        run: python scripts/merge.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ milestones.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update milestone data"
            git push
          fi
